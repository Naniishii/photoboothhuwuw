<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1" />
  <title>Photobooth — Static</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="container">
    <h1>Photobooth</h1>

    <section class="controls">
      <label for="layout">Layout:</label>
      <select id="layout">
        <option value="1x1">1 × 1</option>
        <option value="2x2" selected>2 × 2</option>
        <option value="3x3">3 × 3</option>
        <option value="4x2">4 × 2</option>
        <option value="2x4">2 × 4</option>
      </select>

      <label for="cellSize">Cell size:</label>
      <select id="cellSize">
        <option value="300">300px</option>
        <option value="200" selected>200px</option>
        <option value="150">150px</option>
      </select>

      <button id="startCam">Start Camera</button>
      <button id="stopCam" disabled>Stop Camera</button>
      <button id="capture">Capture</button>
      <button id="autoCapture">Auto Capture (3s)</button>
      <button id="reset">Reset</button>
    </section>

    <section class="preview">
      <div class="video-wrap">
        <video id="video" autoplay playsinline></video>
        <canvas id="hiddenCanvas" style="display:none"></canvas>
      </div>

      <div class="grid-wrap">
        <canvas id="finalCanvas"></canvas>
      </div>
    </section>

    <section class="thumbnails">
      <h2>Captured</h2>
      <div id="thumbs"></div>
      <div class="actions">
        <button id="assemble" disabled>Assemble &rarr; Final Image</button>
        <a id="downloadLink" style="display:none">Download Final Image</a>
      </div>
    </section>

    <footer>
      <p>Tip: For best results allow camera access and use the rear camera on phones. To publish: create a GitHub repo and enable GitHub Pages for this site.</p>
    </footer>
  </main>

  <script src="app.js"></script>
</body>
</html>
