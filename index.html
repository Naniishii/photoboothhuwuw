<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1" />
  <title>Photobooth — Static</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="container">
    <header class="app-header">
      <h1>Photobooth</h1>
      <p class="subtitle">Quick photobooth — pick a layout, allow the camera, then capture.</p>
    </header>

    <section class="controls">
      <div class="controls-left">
        <label for="layout">Layout</label>
        <select id="layout">
          <option value="1x1">1 × 1</option>
          <option value="2x2" selected>2 × 2</option>
          <option value="3x3">3 × 3</option>
          <option value="4x2">4 × 2</option>
          <option value="2x4">2 × 4</option>
        </select>

        <label for="cellSize">Cell size</label>
        <select id="cellSize">
          <option value="300">300px</option>
          <option value="200" selected>200px</option>
          <option value="150">150px</option>
        </select>
      </div>

      <div class="controls-right">
        <button id="startCam" class="btn btn-ghost">Start</button>
        <button id="switchCam" class="btn btn-ghost">Switch</button>
        <button id="stopCam" class="btn btn-ghost" disabled>Stop</button>

        <button id="capture" class="btn btn-primary">📸 Capture</button>
        <button id="autoCapture" class="btn btn-outline">Auto (3s)</button>
        <button id="reset" class="btn btn-ghost">Reset</button>
      </div>
    </section>

    <section class="preview">
      <div class="video-wrap">
        <video id="video" autoplay playsinline></video>
        <canvas id="hiddenCanvas" style="display:none"></canvas>
        <div id="countdown" class="countdown" aria-hidden="true" style="display:none">3</div>
      </div>

      <div class="grid-wrap">
        <canvas id="finalCanvas"></canvas>
      </div>
    </section>

    <section class="thumbnails">
      <h2>Captured</h2>
      <div id="thumbs"></div>
      <div class="actions">
        <button id="assemble" class="btn btn-primary" disabled>Assemble — Final Image</button>
        <a id="downloadLink" class="btn btn-primary" style="display:none">Download Final Image</a>
      </div>
    </section>

    <footer>
      <p>Tip: For best results allow camera access and use the rear camera on phones. To publish: create a GitHub repo and enable GitHub Pages for this site.</p>
    </footer>
  </main>

  <script src="app.js"></script>
</body>
</html>
